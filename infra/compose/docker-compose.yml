services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opora
      POSTGRES_USER: opora
      POSTGRES_PASSWORD: opora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opora -d opora"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      MINIO_ROOT_USER: opora
      MINIO_ROOT_PASSWORD: change-me
    command: server /data --console-address :9001
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  mailpit:
    image: axllent/mailpit:v1.26
    ports:
      - "1025:1025"
      - "8025:8025"

  livekit:
    image: livekit/livekit-server:v1.13.3
    command: --config /etc/livekit.yaml
    volumes:
      - ../livekit/livekit.yaml:/etc/livekit.yaml:ro
    network_mode: host

volumes:
  postgres_data:
  redis_data:
  minio_data:
